<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baybars – Minecraft Bedrock</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-deep:    #0d0f1a;
    --bg-card:    #13162a;
    --bg-card2:   #1a1e35;
    --accent:     #6c63ff;
    --accent-dim: #4f48cc;
    --accent-glow:rgba(108,99,255,.18);
    --text-pri:   #e8e9ed;
    --text-sec:   #9b9ca6;
    --text-muted: #4a4b5a;
    --border:     #1f2240;
    --radius:     8px;
  }
  body { font-family:'Inter',sans-serif; background:var(--bg-deep); color:var(--text-pri); min-height:100vh; }
  header { background:#090b15; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .header-inner { max-width:1280px; margin:0 auto; padding:0 16px; height:60px; display:flex; align-items:center; gap:16px; }
  .logo { font-size:20px; font-weight:800; color:var(--accent); text-decoration:none; }
  .cats { max-width:1280px; margin:0 auto; padding:12px 24px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
  .cat-pill { cursor:pointer; background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:12px; color:var(--text-sec); }
  .cat-pill.active { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }
  .main { max-width:1280px; margin:0 auto; padding:20px 24px; }
  
  /* التنسيق الموحد لكل المودات لتصبح عريضة وكبيرة */
  .mod-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; gap:16px; margin-bottom:12px; flex-direction: column; align-items: flex-start; }
  .mod-thumb { width: 100%; height: auto; aspect-ratio: 16 / 9; border-radius: var(--radius); background:var(--bg-card2); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
  .mod-thumb img { width:100%; height:100%; object-fit:cover; }
  
  .mod-info { flex:1; width: 100%; }
  .mod-name { font-size:15px; font-weight:700; color:#fff; margin-top: 4px; }
  .mod-cat { font-size:11px; color:var(--accent); margin-top:4px; }
  .dl-btn { background:var(--accent); color:#fff; font-size:12px; font-weight:600; padding:8px 16px; border-radius:6px; text-decoration:none; text-align: center; margin-top: 8px; width: auto; }
  .admin-only { display: none !important; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:500; align-items:center; justify-content:center; padding:16px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; width:100%; max-width:500px; padding:20px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">Baybars</a>
    <nav style="margin-left:auto;"><a class="admin-only" id="navUploadBtn" onclick="openUpload()" style="cursor:pointer;color:var(--accent)">Upload</a></nav>
  </div>
</header>

<div class="cats">
  <div class="cat-pill active" onclick="filterMods('All', this)">🧩 الكل</div>
  <div class="cat-pill" onclick="filterMods('Addons', this)">⚙️ مودات</div>
  <div class="cat-pill" onclick="filterMods('Versions', this)">🚀 إصدارات ماينكرافت</div>
  <div class="cat-pill" onclick="filterMods('Skins', this)">👤 السكنات</div>
  <div class="cat-pill" onclick="filterMods('Shaders', this)">✨ الشادرات</div>
</div>

<div class="main">
  <div id="modList"></div>
</div>

<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <select id="modCat" style="width:100%;padding:10px;background:var(--bg-deep);color:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;">
      <option value="Addons">مودات</option>
      <option value="Versions">إصدارات ماينكرافت</option>
      <option value="Skins">السكنات</option>
      <option value="Shaders">الشادرات</option>
    </select>
    <input type="text" id="modName" placeholder="اسم المود/الإصدار" style="width:100%;padding:10px;margin-bottom:10px;background:var(--bg-deep);border:1px solid var(--border);color:#fff;">
    <input type="text" id="modImg" placeholder="رابط الصورة" style="width:100%;padding:10px;margin-bottom:10px;background:var(--bg-deep);border:1px solid var(--border);color:#fff;">
    <input type="text" id="modDl" placeholder="رابط التحميل" style="width:100%;padding:10px;margin-bottom:10px;background:var(--bg-deep);border:1px solid var(--border);color:#fff;">
    <button onclick="submitMod()" style="width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;">نشر</button>
  </div>
</div>

<script>
  let allMods = [
    { name: "TNT Add-On", category: "Addons", image: "https://i.postimg.cc/bNhKxVTp/image-1.jpg", download: "https://devuploads.com/r3izshi4k6pa" },
    { name: "Police Add-On", category: "Addons", image: "https://i.postimg.cc/gcSYNWn1/image-1.jpg", download: "https://devuploads.com/9phdzn8czkbp" },
    { name: "Armor Expansion Add-On", category: "Addons", image: "https://i.postimg.cc/Nf5nYhpc/image-1.jpg", download: "https://devuploads.com/hackjh6s4k81" },
    { name: "Gaming Furniture Add-On", category: "Addons", image: "https://i.postimg.cc/LXLWcjTf/image-1.jpg", download: "https://devuploads.com/ej76cuyin3w6" },
    { name: "Realism Visuals", category: "Shaders", image: "https://i.postimg.cc/wBgnM5Jv/IMG-20260614-141106-849.jpg", download: "https://devuploads.com/x2st7pbd05u7" },
    { name: "Dark Fantasy Visuals 2.0", category: "Shaders", image: "https://i.postimg.cc/brnsrjcb/image-1.jpg", download: "https://devuploads.com/gy7yzn0rkf6s" },
    { name: "Chroma Visuals", category: "Shaders", image: "https://i.postimg.cc/3RPsKsFs/IMG-20260614-141556-979.jpg", download: "https://devuploads.com/9ay9rhh5kg0z" },
    { name: "Luminous Dreams v1.0", category: "Shaders", image: "https://i.postimg.cc/LsJQny5B/IMG-20260614-095723-525.jpg", download: "https://devuploads.com/xicyagzp9rp8" },
    { name: "Animals", category: "Skins", image: "https://i.postimg.cc/jjGT5nxr/IMG-20260614-143526-954.jpg", download: "https://devuploads.com/61dk02yxdrbt" },
    { name: "Ultimate Onesies", category: "Skins", image: "https://i.postimg.cc/mDfxRxjz/IMG-20260614-143717-389.jpg", download: "https://devuploads.com/y745kmnmdibu" },
    { name: "Modern Roleplay", category: "Skins", image: "https://i.postimg.cc/QCfnFvQm/IMG-20260614-143903-474.jpg", download: "https://devuploads.com/cuulj8gqfffq" },
    { name: "Aura Entities", category: "Skins", image: "https://i.postimg.cc/NFCpsmt8/IMG-20260614-144040-650.jpg", download: "https://devuploads.com/cfrbslez87tb" },
    { name: "Anomaly Colors", category: "Skins", image: "https://i.postimg.cc/MKcY0cxL/IMG-20260614-144229-573.jpg", download: "https://devuploads.com/a99fk0nz0xed" },
    { name: "Tubbo's RealmSMP RPG", category: "Skins", image: "https://i.postimg.cc/9Mn7zp4W/IMG-20260614-144342-726.jpg", download: "https://devuploads.com/b0am4vmbix7r" },
    { name: "Deep Divers", category: "Skins", image: "https://i.postimg.cc/nLV2D3LD/IMG-20260614-144500-250.jpg", download: "https://devuploads.com/hoc33a0dcf4e" },
    { name: "Neon Reapers", category: "Skins", image: "https://i.postimg.cc/TYrJNzL5/IMG-20260614-144622-263.jpg", download: "https://devuploads.com/why2zdo3fdmw" },
    { name: "Copper Samurai", category: "Skins", image: "https://i.postimg.cc/qMX2x2Wf/IMG-20260614-144744-949.jpg", download: "https://devuploads.com/mcs4yojsrsg9" },
    { name: "OCEAN BIOMES Add-On", category: "Addons", image: "https://i.postimg.cc/nhrM97JD/IMG-20260614-144856-800.jpg", download: "https://devuploads.com/4tpb40ydg0f0" },
    { name: "تحسينات بصرية", category: "Shaders", image: "https://i.postimg.cc/hGKPndtC/image-1(Copy).jpg", download: "https://devuploads.com/oze6t1fam9bt" },
    { name: "RED MOON MONSTERS", category: "Skins", image: "https://i.postimg.cc/NffjZTLH/IMG-20260614-145008-311.jpg", download: "https://devuploads.com/frtnoqy0zeiq" },
    { name: "Eternal Caves Add-On", category: "Addons", image: "https://i.postimg.cc/Gt3bww33/IMG-20260614-145121-945.jpg", download: "https://devuploads.com/oldg5evj58co" },
    { name: "Wilderness Add-On", category: "Addons", image: "https://i.postimg.cc/kG5PYQwy/IMG-20260614-145237-082.jpg", download: "https://devuploads.com/m5vm25h5zcws" },
    { name: "How to Train Your Dragon", category: "Addons", image: "https://i.postimg.cc/xdjYhV6R/image-1.jpg", download: "https://devuploads.com/thtqgragoh98" },
    { name: "Action and Stuff 1.10.1", category: "Addons", image: "https://i.postimg.cc/brmwVNPj/image-1.jpg", download: "https://devuploads.com/pz2d8kqofk8f" },
    { name: "Cars Add-on", category: "Addons", image: "https://i.postimg.cc/1zZh1hMj/IMG-20260614-145339-275.jpg", download: "https://devuploads.com/3o8sd678hhcr" }
  ];

  function filterMods(cat, el) {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    const listEl = document.getElementById('modList');
    const filtered = cat === 'All' ? allMods : allMods.filter(m => m.category === cat);
    listEl.innerHTML = filtered.map(m => {
      let displayCat = m.category;
      if (m.category === 'Addons') displayCat = 'مودات';
      if (m.category === 'Versions') displayCat = 'إصدارات ماينكرافت';
      if (m.category === 'Skins') displayCat = 'السكنات';
      if (m.category === 'Shaders') displayCat = 'الشادرات';
      
      return `
        <div class="mod-card">
          <div class="mod-thumb"><img src="${m.image}" onerror="this.parentElement.innerHTML='🧩'"></div>
          <div class="mod-info">
            <div class="mod-name">${m.name}</div>
            <div class="mod-cat">${displayCat}</div>
          </div>
          <a href="${m.download}" class="dl-btn" target="_blank">Download</a>
        </div>
      `;
    }).join('');
  }

  function openUpload() { document.getElementById('uploadModal').classList.add('open'); }
  function submitMod() {
    allMods.unshift({
      name: document.getElementById('modName').value,
      category: document.getElementById('modCat').value,
      image: document.getElementById('modImg').value,
      download: document.getElementById('modDl').value
    });
    document.getElementById('uploadModal').classList.remove('open');
    filterMods('All', document.querySelector('.cat-pill'));
  }

  if(new URLSearchParams(window.location.search).get('admin') === 'baybars123') {
    document.getElementById('navUploadBtn').classList.remove('admin-only');
  }

  filterMods('All', document.querySelector('.cat-pill'));
</script>
</body>
</html>
