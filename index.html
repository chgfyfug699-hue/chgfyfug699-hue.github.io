<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baybars – Minecraft Bedrock</title>
<style>
  :root { --bg-deep: #0d0f1a; --bg-card: #13162a; --accent: #6c63ff; --text-pri: #e8e9ed; --text-sec: #9b9ca6; --border: #1f2240; --radius: 8px; }
  body { font-family: sans-serif; background: var(--bg-deep); color: var(--text-pri); margin: 0; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  .mod-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; gap: 16px; margin-bottom: 12px; align-items: center; }
  .mod-thumb { width: 80px; height: 80px; border-radius: 8px; overflow: hidden; background: #1a1e35; }
  .mod-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .mod-info { flex: 1; }
  .mod-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .mod-desc { font-size: 13px; color: var(--text-sec); }
  .dl-btn { background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 600; }
  .admin-only { display: none; margin-bottom: 20px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div id="adminActions" class="admin-only">
    <button style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:5px;">لوحة تحكم الأدمن</button>
  </div>
  <div id="modList"></div>
</div>

<script>
  // أضف موداتك هنا - ستظهر للجميع دائمًا
  const myMods = [
    { name: "Action and stuff", desc: "أقوى مود واقعية في ماينكرافت", image: "https://i.imgur.com/example.png", download: "#" }
  ];

  const list = document.getElementById('modList');
  list.innerHTML = myMods.map(m => `
    <div class="mod-card">
      <div class="mod-thumb"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/80'"/></div>
      <div class="mod-info">
        <div class="mod-name">${m.name}</div>
        <div class="mod-desc">${m.desc}</div>
      </div>
      <a href="${m.download}" class="dl-btn">Download</a>
    </div>
  `).join('');

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('admin') === 'baybars123') {
    document.getElementById('adminActions').style.display = 'block';
  }
</script>
</body>
</html>
