<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baybars – Minecraft Bedrock</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-deep:    #0d0f1a; --bg-card:    #13162a; --bg-card2:   #1a1e35;
    --accent:     #6c63ff; --accent-dim: #4f48cc; --accent-glow:rgba(108,99,255,.18);
    --text-pri:   #e8e9ed; --text-sec:   #9b9ca6; --text-muted: #4a4b5a;
    --border:     #1f2240; --green:      #22c55e; --red:        #ef4444; --radius:     8px;
  }
  body { font-family:'Inter',sans-serif; background:var(--bg-deep); color:var(--text-pri); min-height:100vh; }
  header { background:#090b15; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .header-inner { max-width:1280px; margin:0 auto; padding:0 16px; height:60px; display:flex; align-items:center; gap:16px; }
  .logo { font-size:20px; font-weight:800; color:var(--accent); text-decoration:none; }
  .search-wrap { flex:1; max-width:400px; }
  .search-wrap input { width:100%; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); color:var(--text-pri); padding:8px 12px; outline:none; }
  nav { display:flex; gap:8px; margin-left:auto; }
  .btn-sign { background:var(--accent); color:#fff!important; padding:6px 12px!important; border-radius:6px; text-decoration:none; font-size:13px; }
  .admin-only { display: none !important; }
  .hero { background:linear-gradient(135deg,#080a14 0%,#0f1128 50%,#0d0f1a 100%); border-bottom:1px solid var(--border); padding:40px 24px; text-align:center; }
  .hero h1 { font-size:28px; font-weight:800; color:var(--accent); }
  .main { max-width:1280px; margin:0 auto; padding:20px 24px; display:grid; grid-template-columns:1fr 280px; gap:20px; }
  @media(max-width:900px){.main{grid-template-columns:1fr;}}
  .mod-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; gap:16px; margin-bottom:12px; align-items: center; }
  .mod-thumb { width:75px; height:75px; border-radius:8px; background:var(--bg-card2); overflow:hidden; }
  .mod-thumb img { width:100%; height:100%; object-fit:cover; }
  .mod-info { flex:1; }
  .mod-name { font-size:15px; font-weight:700; color:#fff; }
  .mod-desc { font-size:12.5px; color:var(--text-sec); }
  .dl-btn { background:var(--accent); color:#fff; padding:8px 16px; border-radius:6px; text-decoration:none; font-size:12px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">Baybars</a>
    <div class="search-wrap"><input type="text" placeholder="Search mods..."/></div>
    <nav><a href="#" class="btn-sign">Sign In</a></nav>
  </div>
</header>

<section class="hero"><h1>Minecraft Bedrock Mods</h1></section>

<div class="main">
  <div>
    <div id="modList"></div>
  </div>
  <aside><div style="background:var(--bg-card); padding:16px;">🔥 Trending This Week</div></aside>
</div>

<script>
  // المودات الثابتة (تظهر للكل دائماً)
  const myMods = [
    {
      name: "Action and Stuff",
      desc: "أقوى مود واقعية في ماينكرافت",
      image: "https://i.imgur.com/example.png",
      download: "#"
    }
  ];

  function renderMods() {
    const listEl = document.getElementById('modList');
    listEl.innerHTML = myMods.map(m => `
      <div class="mod-card">
        <div class="mod-thumb"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/75'"/></div>
        <div class="mod-info">
          <div class="mod-name">${m.name}</div>
          <div class="mod-desc">${m.desc}</div>
        </div>
        <a href="${m.download}" class="dl-btn" target="_blank">Download</a>
      </div>
    `).join('');
  }
  renderMods();
</script>
</body>
</html>
