<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تجهيز الرابط المباشر</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --void: #0a0c12;
            --panel: #12151f;
            --diamond: #5ec8e8;
            --ink: #eef1f6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--void);
            color: var(--ink);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--panel);
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 { font-size: 22px; margin-bottom: 10px; color: var(--ink); }
        .status-text { font-size: 15px; color: #9aa1b4; margin-bottom: 25px; }
        .countdown { font-size: 64px; font-weight: bold; color: var(--diamond); margin: 20px 0; }

        .btn {
            display: none;
            background-color: var(--diamond);
            color: var(--void);
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 12px rgba(94, 200, 232, 0.3);
        }
        .btn:hover { background-color: #4db5d4; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h2>مرحباً بك في موقع بايبارس للتحميل</h2>
    <p class="status-text" id="status">برجاء الانتظار 10 ثوانٍ لحين تجهيز رابط التحميل...</p>
    
    <div class="countdown" id="timer">10</div>
    
    <a href="#" class="btn" id="download-btn">اضغط هنا للانتقال إلى رابط التحميل المباشر</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mediafireLink = urlParams.get('url');

    let timeLeft = 10;
    const timerElement = document.getElementById('timer');
    const statusElement = document.getElementById('status');
    const downloadBtn = document.getElementById('download-btn');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.style.display = 'none'; 
            statusElement.textContent = 'تم تجهيز الرابط بنجاح!';
            
            if (mediafireLink) {
                downloadBtn.href = decodeURIComponent(mediafireLink);
            } else {
                downloadBtn.href = "https://chgfyfug699-hue.github.io/"; 
            }
            downloadBtn.style.display = 'block';
        }
    }, 1000);
</script>

</body>
</html>
